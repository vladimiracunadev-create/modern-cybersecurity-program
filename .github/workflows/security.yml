name: Security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secretos:
    name: Escaneo de secretos (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Instalar gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Detectar secretos en el árbol de archivos
        # Los README de clase incluyen tokens de ejemplo (didácticos); se
        # excluyen vía .gitleaks.toml. El resto del repo sí se escanea.
        run: gitleaks detect --no-git --redact -v --source . --config .gitleaks.toml

  sast:
    name: Análisis estático (bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit==1.9.4

      - name: Escaneo de seguridad de los scripts
        # -ll: reporta solo severidad media/alta (evita falsos positivos de bajo nivel
        # como el uso legítimo y controlado de subprocess en el generador de PDFs).
        run: bandit -q -r scripts -ll
