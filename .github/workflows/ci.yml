name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  estructura:
    name: Estructura y enlaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validar estructura, secciones y enlaces internos
        run: python scripts/validar_estructura.py

      - name: Validar navegación bidireccional (anterior/siguiente)
        run: python scripts/generar_navegacion.py --check

      - name: Validar codificación (sin mojibake, todo UTF-8)
        run: python scripts/validar_encoding.py

      - name: Resumen
        if: always()
        run: |
          {
            echo "### Programa de Ciberseguridad Moderna"
            echo ""
            echo "- Partes: **$(find classes -mindepth 1 -maxdepth 1 -type d -name 'parte-*' | wc -l)**"
            echo "- Clases: **$(find classes -mindepth 3 -name README.md | wc -l)**"
          } >> "$GITHUB_STEP_SUMMARY"

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      # Version fijada a proposito: sin pin, npx instala la ultima y una release
      # con reglas nuevas pone el CI en rojo sin que nadie toque el repo.
      - name: Lint Markdown (markdownlint-cli2)
        run: npx --yes markdownlint-cli2@0.23.0 "**/*.md"

  generar-sitio:
    name: Build del sitio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias del generador
        run: python -m pip install "markdown==3.10.2"

      - name: Generar sitio (verifica que compila)
        run: python scripts/generar_sitio.py
