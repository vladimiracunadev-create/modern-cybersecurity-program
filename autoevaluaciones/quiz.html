trizar en la consulta", "Se usa HTTPS", "El sitio usa cookies"], "correcta": 1, "exp": "La defensa principal son las consultas parametrizadas (prepared statements)."}, {"q": "¿Qué tipo de XSS persiste en el servidor y afecta a otros usuarios?", "opciones": ["Reflejado", "Almacenado", "Basado en DOM", "Ninguno"], "correcta": 1, "exp": "El XSS almacenado guarda el payload y se sirve a cada visitante."}, {"q": "SSRF permite a un atacante…", "opciones": ["Cifrar la base de datos", "Hacer que el servidor haga peticiones a destinos internos", "Acelerar la app", "Cambiar el CSS"], "correcta": 1, "exp": "Server-Side Request Forgery abusa del servidor como proxy hacia recursos internos."}, {"q": "IDOR es un fallo de…", "opciones": ["Cifrado", "Control de acceso (referencia directa a objetos sin autorización)", "Rendimiento", "Configuración de DNS"], "correcta": 1, "exp": "Cambiar un identificador accede a datos de otro usuario por falta de verificación."}, {"q": "La mejor defensa contra CSRF es…", "opciones": ["Ocultar el formulario", "Tokens anti-CSRF y SameSite en cookies", "Usar GET para todo", "Deshabilitar JavaScript"], "correcta": 1, "exp": "Token por sesión/petición y cookies SameSite frenan la petición forjada."}]}, {"idx": 5, "titulo": "Explotación de sistemas y binarios", "preguntas": [{"q": "Un buffer overflow en el stack puede sobrescribir…", "opciones": ["El BIOS", "La dirección de retorno guardada", "El disco duro", "El DNS"], "correcta": 1, "exp": "Al desbordar, se pisa la saved return address y se desvía el flujo."}, {"q": "¿Qué protección aleatoriza las direcciones de memoria?", "opciones": ["DEP/NX", "ASLR", "Stack canary", "PIE"], "correcta": 1, "exp": "ASLR randomiza el mapa de memoria; DEP/NX marca zonas no ejecutables."}, {"q": "ROP (Return-Oriented Programming) sirve para…", "opciones": ["Compilar más rápido", "Ejecutar código reutilizando 'gadgets' cuando NX impide shellcode", "Cifrar el binario", "Depurar sin GDB"], "correcta": 1, "exp": "Encadena gadgets que terminan en `ret` para eludir NX/DEP."}, {"q": "¿Qué herramienta es de ingeniería inversa?", "opciones": ["Nmap", "Ghidra", "Wireshark", "Hydra"], "correcta": 1, "exp": "Ghidra (y IDA/radare2) desensamblan y decompilan binarios."}, {"q": "El fuzzing busca vulnerabilidades…", "opciones": ["Leyendo el manual", "Enviando entradas malformadas/aleatorias para provocar fallos", "Cifrando el binario", "Escaneando puertos"], "correcta": 1, "exp": "AFL++/libFuzzer mutan entradas para encontrar crashes explotables."}]}, {"idx": 6, "titulo": "Análisis de malware", "preguntas": [{"q": "El análisis estático se diferencia del dinámico en que…", "opciones": ["Ejecuta la muestra", "Examina la muestra SIN ejecutarla", "Requiere Internet", "Solo aplica a Linux"], "correcta": 1, "exp": "Estático = sin ejecutar (strings, PE, desensamblado); dinámico = observar en ejecución."}, {"q": "¿Dónde se debe ejecutar malware para analizarlo?", "opciones": ["En tu equipo principal", "En una VM aislada sin acceso a la red productiva", "En un servidor de producción", "En el móvil"], "correcta": 1, "exp": "Sandbox/VM aislada con snapshots; nunca en equipos reales o con red abierta."}, {"q": "Las reglas YARA sirven para…", "opciones": ["Cifrar malware", "Detectar/clasificar muestras por patrones", "Acelerar el disco", "Compilar exploits"], "correcta": 1, "exp": "YARA describe patrones (strings/bytes) para cazar familias de malware."}, {"q": "El 'packing' de un binario busca…", "opciones": ["Reducir su tamaño y/o ofuscar su contenido", "Firmarlo digitalmente", "Documentarlo", "Traducirlo"], "correcta": 0, "exp": "Comprime/cifra el código; hay que 'unpackear' para analizarlo."}, {"q": "El tráfico C2 de un malware es…", "opciones": ["Su interfaz gráfica", "El canal de comando y control con el atacante", "Un antivirus", "Un instalador"], "correcta": 1, "exp": "Command & Control: recibe órdenes y exfiltra datos; su beaconing es detectable."}]}, {"idx": 7, "titulo": "Red Team y operaciones ofensivas", "preguntas": [{"q": "MITRE ATT&CK es…", "opciones": ["Un antivirus", "Una base de conocimiento de tácticas y técnicas de adversarios", "Un lenguaje de programación", "Un firewall"], "correcta": 1, "exp": "Mapea el comportamiento del adversario; sirve para ofensiva y defensa."}, {"q": "El Kerberoasting ataca…", "opciones": ["Certificados TLS", "Cuentas de servicio pidiendo tickets TGS crackeables offline", "El BIOS", "El DNS"], "correcta": 1, "exp": "Solicita TGS de cuentas con SPN y crackea su hash fuera de línea."}, {"q": "Pass-the-Hash permite autenticarse…", "opciones": ["Con la contraseña en claro", "Usando el hash NTLM sin conocer la contraseña", "Solo con biometría", "Con un OTP"], "correcta": 1, "exp": "Reutiliza el hash como credencial para moverse lateralmente."}, {"q": "BloodHound se usa para…", "opciones": ["Cifrar el dominio", "Graficar rutas de ataque en Active Directory", "Escanear puertos", "Analizar malware"], "correcta": 1, "exp": "Modela relaciones AD y encuentra caminos hacia Domain Admins."}, {"q": "Un Golden Ticket se forja con el hash de…", "opciones": ["Administrator local", "La cuenta krbtgt", "El usuario invitado", "La cuenta SYSTEM"], "correcta": 1, "exp": "Con el hash de krbtgt se firman TGTs arbitrarios (control total del dominio)."}]}, {"idx": 8, "titulo": "Blue Team, detección y SOC", "preguntas": [{"q": "Un SIEM sirve principalmente para…", "opciones": ["Cifrar discos", "Centralizar, correlacionar y alertar sobre logs/telemetría", "Escanear puertos", "Compilar exploits"], "correcta": 1, "exp": "Agrega eventos de múltiples fuentes y dispara detecciones."}, {"q": "Sigma es…", "opciones": ["Un SIEM propietario", "Un formato genérico de reglas de detección portable entre SIEMs", "Un malware", "Un protocolo de red"], "correcta": 1, "exp": "Describe detecciones en YAML y se traduce a la query de cada SIEM."}, {"q": "El 'threat hunting' es…", "opciones": ["Esperar alertas pasivamente", "Buscar proactivamente amenazas no detectadas por l lar las marcas de tiempo de archivos para despistar", "Acelerar el disco", "Cifrar timestamps"], "correcta": 1, "exp": "Se detecta comparando $STANDARD_INFORMATION vs $FILE_NAME en NTFS."}]}, {"idx": 10, "titulo": "Seguridad en la nube y contenedores", "preguntas": [{"q": "El modelo de responsabilidad compartida dice que…", "opciones": ["El proveedor es responsable de todo", "El cliente es responsable de todo", "El proveedor asegura la nube y el cliente la seguridad EN la nube", "Nadie es responsable"], "correcta": 2, "exp": "El reparto varía según IaaS/PaaS/SaaS, pero el cliente siempre configura su parte."}, {"q": "Una causa muy común de brechas en la nube es…", "opciones": ["Cifrado fuerte", "Configuraciones erróneas (p. ej. buckets públicos, IAM laxo)", "Usar MFA", "Rotar claves"], "correcta": 1, "exp": "El misconfiguration domina los incidentes cloud."}, {"q": "En Kubernetes, RBAC controla…", "opciones": ["El ancho de banda", "Quién puede hacer qué sobre los recursos del clúster", "El cifrado de disco", "La CPU de los pods"], "correcta": 1, "exp": "Role-Based Access Control define permisos por sujeto y recurso."}, {"q": "Un 'container escape' es…", "opciones": ["Reiniciar el contenedor", "Salir del aislamiento del contenedor hacia el host", "Borrar una imagen", "Exportar logs"], "correcta": 1, "exp": "Abusa de configuraciones (privileged, mounts) para llegar al host."}, {"q": "Para IAM en la nube, la buena práctica es…", "opciones": ["Usar siempre la cuenta root", "Permisos amplios por comodidad", "Mínimo privilegio y roles temporales", "Claves compartidas por equipo"], "correcta": 2, "exp": "Menos privilegio + credenciales efímeras reducen el impacto."}]}, {"idx": 11, "titulo": "DevSecOps y seguridad del SDLC", "preguntas": [{"q": "'Shift-left' significa…", "opciones": ["Mover la seguridad al final", "Integrar la seguridad temprano en el ciclo de desarrollo", "Eliminar las pruebas", "Desplegar sin revisar"], "correcta": 1, "exp": "Detectar y corregir antes = m const app = document.getElementById('app');
PARTES.forEach((parte, pi) => {
  const sec = document.createElement('section');
  sec.innerHTML = `<h2>Parte ${parte.idx} — ${parte.titulo}</h2>`;
  parte.preguntas.forEach((pr, qi) => {
    const card = document.createElement('div'); card.className='card';
    let opts = pr.opciones.map((o,oi)=>
      `<label class="opt" data-p="${pi}" data-q="${qi}" data-o="${oi}">
         <input type="radio" name="q_${pi}_${qi}" value="${oi}">${o}</label>`).join('');
    card.innerHTML = `<div class="q">${qi+1}. ${pr.q}</div>${opts}
      <div class="exp" id="e_${pi}_${qi}">✔️ ${pr.exp}</div>`;
    sec.appendChild(card);
  });
  const btn = document.createElement('button');
  btn.textContent = 'Corregir parte ' + parte.idx;
  const score = document.createElement('div'); score.className='score';
  btn.onclick = () => {
    let ok=0;
    parte.preguntas.forEach((pr,qi)=>{
      const sel = sec.querySelector(`input[name="q_${pi}_${qi}"]:checked`);
      sec.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(l=>l.classList.remove('ok','bad'));
      const correcta = sec.querySelector(`.opt[data-q="${qi}"][data-o="${pr.correcta}"]`);
      if(correcta) correcta.classList.add('ok');
      if(sel){
        if(parseInt(sel.value)===pr.correcta) ok++;
        else sec.querySelector(`.opt[data-q="${qi}"][data-o="${sel.value}"]`).classList.add('bad');
      }
      document.getElementById(`e_${pi}_${qi}`).style.display='block';
    });
    score.textContent = `Puntuación: ${ok} / ${parte.preguntas.length}`;
  };
  sec.appendChild(btn); sec.appendChild(score);
  app.appendChild(sec);
});
